[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 256

[profile.ci]
fuzz = { runs = 1000 }

[profile.gas]
gas_reports = ["GauloiStaking", "GauloiEscrow", "GauloiDisputes"]

[profile.fork]
match_contract = "Fork"

[rpc_endpoints]
sepolia = "https://ethereum-sepolia-rpc.publicnode.com"
arbitrum_sepolia = "https://arbitrum-sepolia-rpc.publicnode.com"
